name: Demonstrating dependencies
on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: setup java
        uses: actions/setup-java@v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'

  maven:
    runs-on: ubuntu-latest

    steps:
      - name: execute maven package
        run: mvn package
